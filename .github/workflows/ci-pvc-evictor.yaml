name: PVC Evictor CI

on:
  pull_request:
    paths:
      - 'kv_connectors/pvc_evictor/**'
  push:
    branches:
      - main
    paths:
      - 'kv_connectors/pvc_evictor/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kv_connectors/pvc_evictor
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v
